<!doctype html>
<html lang="zh-Hant-TW">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>福岡親子行程工具</title>
  <style>
    :root{
      --green:#1E4636;
      --gold:#B98F2D;
      --paper:#F3F1E8;
      --ink:#20261F;
      --muted:#6E746B;
      --line:#D8D0BD;
      --card:#FFFCF2;
      --warn:#A8432B;
      --ok:#347B55;
      --amber:#B7791F;
      --bad:#A8432B;
      --shadow:0 8px 22px rgba(32,38,31,.12);
      --bottom:88px;
    }
    *{box-sizing:border-box}
    html,body{margin:0;min-height:100%;background:var(--paper);color:var(--ink);font-family:"Noto Sans TC","PingFang TC","Microsoft JhengHei",system-ui,-apple-system,BlinkMacSystemFont,sans-serif}
    body{padding-bottom:calc(var(--bottom) + env(safe-area-inset-bottom))}
    button,input,select,textarea{font:inherit}
    button{border:0;background:none;color:inherit;cursor:pointer}
    .app{max-width:720px;margin:0 auto}
    .top{position:sticky;top:0;z-index:20;background:linear-gradient(180deg,var(--green),#17372A);color:#fff;padding:12px 12px 10px;box-shadow:0 4px 18px rgba(0,0,0,.18)}
    .title{display:flex;align-items:center;justify-content:space-between;gap:8px;margin-bottom:10px}
    .title h1{font-size:18px;line-height:1.2;margin:0;font-weight:800;letter-spacing:.02em}
    .tiny{font-size:11px;opacity:.86}
    .tabs{display:flex;gap:8px;overflow-x:auto;padding-bottom:3px;scrollbar-width:none}
    .tabs::-webkit-scrollbar{display:none}
    .tab{position:relative;flex:0 0 auto;min-width:58px;height:44px;border-radius:8px 8px 5px 5px;background:rgba(255,255,255,.13);color:#fff;border:1px solid rgba(255,255,255,.18);display:flex;flex-direction:column;align-items:center;justify-content:center}
    .tab.active{background:var(--paper);color:var(--green);font-weight:800}
    .tab .dot{position:absolute;right:6px;top:5px;width:8px;height:8px;border-radius:50%;background:var(--gold);box-shadow:0 0 0 2px rgba(255,255,255,.35)}
    main{padding:12px}
    .panel{background:var(--card);border:1px solid var(--line);border-radius:8px;margin-bottom:12px;box-shadow:var(--shadow)}
    .strip{padding:10px 10px 12px}
    .row{display:flex;gap:8px;align-items:center}
    .row.wrap{flex-wrap:wrap}
    .row.between{justify-content:space-between}
    .seg{display:grid;grid-template-columns:repeat(3,1fr);gap:6px;background:#E9E2D2;border-radius:8px;padding:4px}
    .seg button{min-height:40px;border-radius:6px;font-weight:800;color:var(--green)}
    .seg button.active{background:#fff;color:var(--ink);box-shadow:0 1px 4px rgba(0,0,0,.12)}
    label.small{font-size:12px;color:var(--muted);font-weight:700}
    input[type="time"],input[type="number"],select{min-height:40px;border:1px solid var(--line);border-radius:7px;background:#fff;color:var(--ink);padding:6px 8px}
    .route{padding:12px 10px 10px;overflow:hidden}
    .routeLine{display:flex;align-items:flex-start;gap:0;overflow-x:auto;padding-bottom:3px}
    .stop{position:relative;flex:0 0 auto;min-width:82px;text-align:center}
    .stop .circle{width:18px;height:18px;border-radius:50%;background:var(--green);border:3px solid var(--paper);box-shadow:0 0 0 2px var(--green);margin:0 auto 4px}
    .stop .name{font-size:12px;font-weight:800;line-height:1.25;max-width:88px;white-space:normal}
    .legMark{flex:0 0 54px;text-align:center;padding-top:2px}
    .legMark .bar{height:3px;background:var(--gold);margin:7px -2px 4px}
    .legMark.via .bar{height:0;border-top:3px dashed var(--warn);background:none}
    .legMark.long .min,.legMark.via .min{color:var(--warn);font-weight:900}
    .legMark .min{font-size:11px;color:#6B551B;font-weight:800}
    .summary{font-size:13px;color:var(--muted);padding:0 10px 10px;line-height:1.45}
    .notice{padding:10px;display:grid;gap:8px}
    .msg{border-radius:7px;padding:9px 10px;font-size:13px;line-height:1.45;background:#F7EFE4;border:1px solid #E5D4BC}
    .msg.warn{background:#F8E9E5;border-color:#E0B5AA;color:#692519}
    .msg.ok{background:#E9F3EC;border-color:#BFD9C8;color:#1E4636}
    .msg h3{font-size:13px;margin:0 0 4px;font-weight:900}
    .cards{display:grid;gap:10px}
    .card{background:var(--card);border:1px solid var(--line);border-radius:8px;box-shadow:var(--shadow);overflow:hidden}
    .card.locked{border-left:5px solid var(--gold)}
    .cardHead{padding:10px;display:grid;gap:7px}
    .cardTop{display:flex;align-items:flex-start;justify-content:space-between;gap:8px}
    .time{font-size:13px;color:var(--green);font-weight:900;white-space:nowrap}
    .pname{font-weight:900;font-size:16px;line-height:1.3}
    .meta{display:flex;gap:6px;flex-wrap:wrap}
    .badge{display:inline-flex;align-items:center;min-height:24px;border-radius:999px;padding:3px 8px;font-size:12px;font-weight:800;background:#EFE7D5;color:#5E4A16}
    .badge.ok{background:#E2F1E7;color:#246341}
    .badge.amber{background:#F7E6C8;color:#80520E}
    .badge.bad{background:#F3D7D0;color:#8C2E1E}
    .badge.lock{background:#FFF0C2;color:#755400}
    .note{font-size:13px;color:var(--muted);line-height:1.45}
    .stroller{font-size:13px;line-height:1.45;border-radius:7px;padding:8px 9px;border:1px solid #D8D0BD;background:#F8F2E3}
    .stroller.ok{border-color:#BFD9C8;background:#E9F3EC;color:#1E4636}
    .stroller.amber{border-color:#E8C98E;background:#FFF3D7;color:#77500F}
    .stroller.bad{border-color:#E0B5AA;background:#F8E9E5;color:#7A2A1C;font-weight:800}
    .controls{display:grid;grid-template-columns:repeat(5,minmax(40px,1fr));gap:6px;border-top:1px solid var(--line);padding:8px;background:#FBF7EA}
    .controls button,.fileBtn{min-height:40px;border-radius:7px;background:#fff;border:1px solid var(--line);font-weight:900;color:var(--green);display:flex;align-items:center;justify-content:center}
    .controls button.danger{color:var(--warn)}
    .controls button:disabled{opacity:.35;cursor:not-allowed}
    .duration{display:flex;align-items:center;justify-content:center;gap:4px;font-size:13px;font-weight:900}
    .trans{margin:0 8px 10px;border:1px solid var(--line);border-radius:8px;overflow:hidden;background:#fff}
    .trans summary{min-height:40px;padding:9px 10px;cursor:pointer;font-size:13px;font-weight:900;color:var(--green)}
    .trans.via summary,.trans.long summary{color:var(--warn)}
    .transBody{border-top:1px solid var(--line);padding:10px;font-size:13px;line-height:1.55;color:#3D433A}
    .transBody ol{margin:6px 0 0 20px;padding:0}
    .transBody li{margin:3px 0}
    .home{padding:11px 10px;background:#F7F1E2;border:1px dashed var(--gold);border-radius:8px;margin:10px 0 0;font-size:13px;line-height:1.55}
    .bottom{position:fixed;left:0;right:0;bottom:0;z-index:30;background:#17372A;color:#fff;padding:8px 10px calc(8px + env(safe-area-inset-bottom));box-shadow:0 -6px 18px rgba(0,0,0,.22)}
    .bottom .bar{max-width:720px;margin:0 auto;display:grid;grid-template-columns:repeat(4,1fr);gap:8px}
    .bottom button{min-height:48px;border-radius:8px;background:rgba(255,255,255,.12);border:1px solid rgba(255,255,255,.17);font-weight:900}
    .bottom button.primary{background:var(--gold);color:#1A1A12}
    .sheetBackdrop{position:fixed;inset:0;background:rgba(0,0,0,.34);z-index:40;display:none}
    .sheetBackdrop.show{display:block}
    .sheet{position:absolute;left:0;right:0;bottom:0;max-height:84vh;overflow:auto;background:var(--paper);border-radius:14px 14px 0 0;padding:12px;box-shadow:0 -16px 42px rgba(0,0,0,.28)}
    .sheetHead{position:sticky;top:0;background:var(--paper);padding-bottom:8px;z-index:1}
    .sheet h2{font-size:18px;margin:0 0 8px;color:var(--green)}
    .chips{display:flex;gap:6px;overflow-x:auto;padding-bottom:8px}
    .chip{flex:0 0 auto;min-height:36px;border:1px solid var(--line);background:#fff;border-radius:999px;padding:6px 10px;font-size:13px;font-weight:800;color:var(--green)}
    .chip.active{background:var(--green);color:#fff;border-color:var(--green)}
    .placeList{display:grid;gap:8px}
    .placeItem{display:grid;grid-template-columns:1fr auto;gap:8px;align-items:center;background:#fff;border:1px solid var(--line);border-radius:8px;padding:10px}
    .placeItem strong{display:block;font-size:15px;margin-bottom:4px}
    .placeItem .sub{font-size:12px;color:var(--muted);line-height:1.45}
    .placeItem button{min-width:58px;min-height:40px;border-radius:7px;background:var(--green);color:#fff;font-weight:900}
    .filePanel{display:none;padding:10px}
    .filePanel.show{display:block}
    .fileGrid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
    .fileGrid button,.fileGrid label{min-height:42px;border-radius:7px;background:#fff;border:1px solid var(--line);font-weight:900;color:var(--green);display:flex;align-items:center;justify-content:center;text-align:center}
    #importFile{display:none}
    .toast{position:fixed;left:12px;right:12px;bottom:calc(var(--bottom) + 14px + env(safe-area-inset-bottom));z-index:60;background:#20261F;color:#fff;border-radius:8px;padding:10px 12px;box-shadow:var(--shadow);font-size:14px;display:none;max-width:696px;margin:0 auto}
    .toast.show{display:block}
    .empty{padding:18px;text-align:center;color:var(--muted);font-size:14px}
    @media (min-width:620px){
      .tab{min-width:64px}
      .bottom .bar{grid-template-columns:repeat(4,150px);justify-content:center}
      .cards{grid-template-columns:1fr}
    }
  </style>
</head>
<body>
  <div class="app">
    <header class="top">
      <div class="title">
        <div>
          <h1>福岡親子行程工具</h1>
          <div class="tiny">博多住吉 5-6-21｜3 歲＋4 歲｜離線可用</div>
        </div>
        <div class="tiny" id="saveState">自動存檔</div>
      </div>
      <nav class="tabs" id="tabs" aria-label="日期分頁"></nav>
    </header>

    <main>
      <section class="panel strip">
        <div class="seg" role="group" aria-label="天氣模式">
          <button data-mode="sunny">晴天</button>
          <button data-mode="rainy">雨天</button>
          <button data-mode="hot">酷暑</button>
        </div>
        <div class="row between wrap" style="margin-top:10px">
          <label class="small" for="startTime">出發時間</label>
          <input id="startTime" type="time">
          <span class="tiny" id="originHint"></span>
        </div>
      </section>

      <section class="panel route" aria-label="路線帶">
        <div class="routeLine" id="routeLine"></div>
        <div class="summary" id="routeSummary"></div>
      </section>

      <section class="panel notice" id="notice"></section>
      <section class="cards" id="cards"></section>
      <section class="panel filePanel" id="filePanel">
        <div class="fileGrid">
          <button id="exportBtn">匯出 JSON</button>
          <label for="importFile">匯入 JSON</label>
          <input id="importFile" type="file" accept="application/json,.json">
          <button id="resetBtn">重置預設</button>
          <button id="closeFileBtn">關閉</button>
        </div>
      </section>
    </main>
  </div>

  <div class="bottom" role="toolbar" aria-label="固定操作列">
    <div class="bar">
      <button class="primary" id="addPlaceBtn">＋地點</button>
      <button id="addRestBtn">＋休息</button>
      <button id="optBtn">⚡優化</button>
      <button id="fileBtn">💾檔案</button>
    </div>
  </div>

  <div class="sheetBackdrop" id="sheetBackdrop" aria-hidden="true">
    <div class="sheet" role="dialog" aria-modal="true" aria-label="加入地點">
      <div class="sheetHead">
        <div class="row between">
          <h2>加入地點</h2>
          <button class="chip" id="closeSheetBtn">關閉</button>
        </div>
        <div class="chips" id="areaChips"></div>
      </div>
      <div class="placeList" id="placeList"></div>
    </div>
  </div>
  <div class="toast" id="toast" role="status"></div>

  <script>
    const AREA={
      air:'機場',hak:'博多',ten:'天神',oho:'大濠',mom:'百道',kai:'貝塚',rop:'六本松',
      umi:'海之中道',moj:'門司港',kok:'小倉',yuf:'由布院',daz:'太宰府',yan:'柳川'
    };
    const P=[
      {id:'checkin',n:'入住・放行李',a:'hak',d:60,i:1,k:'◎',b:'夜',su:2,ra:2,ho:2,note:'住宿固定：福岡市博多区住吉 5-6-21。7/2 僅入住與採買。'},
      {id:'hakata_shop',n:'博多站採買',a:'hak',d:70,i:1,k:'○',b:'夜',su:2,ra:2,ho:2,note:'可補水、早餐、尿布與交通卡。博多站周邊蔬食選項需現場核對。'},
      {id:'uminaka_park',n:'海之中道海濱公園',a:'umi',d:150,i:0,k:'◎',b:'早',su:2,ra:0,ho:0,note:'戶外大範圍，酷暑請只排 10:30 前或改室內；海之中道↔百道渡輪為季節航班，需當日核對。'},
      {id:'marine_world',n:'海洋世界海之中道',a:'umi',d:130,i:1,k:'◎',b:'午',su:2,ra:2,ho:2,note:'雨天與酷暑友善，適合接在海濱公園後避熱。'},
      {id:'yatai',n:'屋台體驗',a:'ten',d:80,i:0,k:'△',b:'夜',su:1,ra:0,ho:1,note:'親子建議早點去、短停留；素食家長需先備替代餐。'},
      {id:'anpanman',n:'福岡麵包超人兒童博物館',a:'hak',d:150,i:1,k:'◎',b:'早',su:2,ra:2,ho:2,note:'室內親子主力景點，雨天與酷暑優先。'},
      {id:'canal',n:'博多運河城',a:'hak',d:120,i:1,k:'○',b:'傍晚',su:2,ra:2,ho:2,note:'採買、用餐、休息都方便；素食需以商場餐廳現場確認。'},
      {id:'ohori_park',n:'大濠公園',a:'oho',d:90,i:0,k:'◎',b:'早',su:2,ra:0,ho:0,note:'推車友善；酷暑務必早上短停。'},
      {id:'zoo',n:'福岡市動植物園',a:'rop',d:150,i:0,k:'◎',b:'早',su:2,ra:0,ho:0,note:'週一休館註記未即時查證 2026/7 實況；斜坡多，請備水。'},
      {id:'nap_home',n:'回住宿午睡',a:'hak',d:120,i:1,k:'◎',b:'午',su:2,ra:2,ho:2,note:'13:00–15:00 午睡節奏核心，優化時固定位置。'},
      {id:'yufuin_train',n:'由布院之森列車',a:'yuf',d:135,i:1,k:'◎',b:'早',su:2,ra:2,ho:2,ride:1,note:'已預約。實際發車時刻未知，請依票面調整本日出發時間；此區塊不可刪除、不可移日。'},
      {id:'yunotsubo',n:'湯之坪街道',a:'yuf',d:120,i:0,k:'○',b:'午',su:1,ra:0,ho:0,note:'人潮多，雨天與酷暑不建議久停；可縮短並提早回程。'},
      {id:'yufuin_rest',n:'回程午睡',a:'yuf',d:90,i:1,k:'◎',b:'午',su:2,ra:2,ho:2,ride:1,note:'以車上休息為主，乘車型行程前段交通=0。'},
      {id:'tenmangu',n:'太宰府天滿宮',a:'daz',d:90,i:0,k:'○',b:'早',su:2,ra:1,ho:0,note:'戶外參拜，酷暑請排早上。'},
      {id:'dazaifu_park',n:'太宰府遊樂園',a:'daz',d:120,i:0,k:'◎',b:'午',su:2,ra:0,ho:0,note:'3–4 歲適合，但天熱容易耗體力。'},
      {id:'kyuhaku',n:'九州國立博物館',a:'daz',d:100,i:1,k:'○',b:'午',su:2,ra:2,ho:2,note:'週一休館註記未即時查證；雨天、酷暑可作主力替代。'},
      {id:'rail_museum',n:'九州鐵道紀念館',a:'moj',d:110,i:1,k:'◎',b:'早',su:2,ra:2,ho:2,note:'鐵道迷親子友善，門司港日主力。'},
      {id:'curry',n:'門司港燒咖哩',a:'moj',d:70,i:1,k:'○',b:'午',su:2,ra:2,ho:2,note:'多為葷食，素食家長建議先備餐或現場確認。'},
      {id:'mojiko_retro',n:'門司港懷舊區',a:'moj',d:120,i:0,k:'○',b:'傍晚',su:2,ra:1,ho:0,note:'散步型景點，酷暑請縮短並避開正午。'},
      {id:'yanagawa_boat',n:'柳川遊船',a:'yan',d:100,i:0,k:'○',b:'早',su:2,ra:0,ho:0,note:'雨天與酷暑不建議；需留意孩童耐心與救生規範。'},
      {id:'unagi',n:'柳川鰻魚飯',a:'yan',d:80,i:1,k:'○',b:'午',su:2,ra:2,ho:2,note:'素食家長需另備選項。'},
      {id:'teamlab',n:'teamLab Forest 福岡',a:'mom',d:120,i:1,k:'◎',b:'早',su:2,ra:2,ho:2,note:'室內沉浸式，雨天與酷暑友善。'},
      {id:'fukuoka_tower',n:'福岡塔',a:'mom',d:80,i:1,k:'○',b:'傍晚',su:2,ra:2,ho:2,note:'百道區室內眺望點，可接海濱散步但酷暑不久留戶外。'},
      {id:'airport',n:'前往機場・報到候機',a:'air',d:150,i:1,k:'○',b:'傍晚',su:2,ra:2,ho:2,note:'約 20:00 起飛；地鐵抵國內線後需轉免費接駁至國際線，請以航空公司櫃台時間為準。'},
      {id:'fukuoka_museum',n:'福岡市博物館',a:'mom',d:90,i:1,k:'○',b:'午',su:2,ra:2,ho:2,note:'週一休館註記未即時查證；百道區雨天替代。'},
      {id:'science',n:'福岡市科學館',a:'rop',d:120,i:1,k:'◎',b:'午',su:2,ra:2,ho:2,note:'週二休館註記未即時查證；六本松室內親子強點。'},
      {id:'kaizuka_park',n:'貝塚交通公園',a:'kai',d:90,i:0,k:'◎',b:'早',su:2,ra:0,ho:0,note:'戶外交通遊戲，酷暑需避開正午。'},
      {id:'kushida',n:'櫛田神社',a:'hak',d:45,i:0,k:'○',b:'早',su:2,ra:1,ho:1,note:'短停留合適，可與博多商圈串接。'},
      {id:'tenjin_chikagai',n:'天神地下街',a:'ten',d:75,i:1,k:'○',b:'午',su:2,ra:2,ho:2,note:'雨天、酷暑避難點；採買與餐飲選擇多，素食需現場核對。'},
      {id:'kokura_castle',n:'小倉城',a:'kok',d:100,i:1,k:'○',b:'午',su:2,ra:2,ho:1,note:'可與門司港日串接，但跨區會增加疲勞。'},
      {id:'ichiran',n:'一蘭總店',a:'ten',d:70,i:1,k:'△',b:'夜',su:2,ra:2,ho:2,note:'排隊與座位型態對幼兒較辛苦；素食不適合。'},
      {id:'sumiyoshi',n:'住吉神社',a:'hak',d:50,i:0,k:'○',b:'早',su:2,ra:1,ho:1,note:'離住宿近，7/11 短行程合適。'},

      const indoors=P.filter(p=>p.i&&weatherScore(p)>=2&&!day.blocks.some(b=>b.pid===p.id)).slice(0,3);
      let html='';
      if(comp.warnings.warn.length){
        html+=`<div class="msg warn"><h3>行程警示</h3>${comp.warnings.warn.map(x=>`<div>・${x}</div>`).join('')}</div>`;
      }else html+=`<div class="msg ok"><h3>今日順序可行</h3><div>目前沒有 ≥90 分、折返博多、三區以上或明顯回頭路警示。</div></div>`;
      const tips=[...comp.warnings.tip];
      if(state.mode==='hot')tips.push('酷暑通則：戶外限 10:30 前／16:30 後，正午優先室內館、商場或回住宿。');
      if(state.mode==='rainy')tips.push('雨天通則：室內館優先，備案可選麵包超人、海洋世界、teamLab、科學館、博物館、天神地下街。');
      if(bad.length)tips.push(`${modeName()}不建議：${bad.map(p=>p.n).join('、')}。`);
      if(amber.length)tips.push(`${modeName()}尚可：${amber.map(p=>p.n).join('、')}，建議縮短或調整到舒適時段。`);
      if(indoors.length)tips.push(`室內替代 3 選：${indoors.map(p=>p.n).join('、')}。`);
      html+=`<div class="msg"><h3>天氣與節奏建議</h3>${tips.length?tips.map(x=>`<div>・${x}</div>`).join(''):'<div>・目前天氣適性良好，保持補水與午睡節奏。</div>'}</div>`;
      const noStroller=comp.rows.filter(r=>strollerInfo(r.b).v===0).map(r=>blockName(r.b));
      const cautionStroller=comp.rows.filter(r=>strollerInfo(r.b).v===1).map(r=>blockName(r.b));
      const strollerTips=[];
      if(noStroller.length)strollerTips.push(`不建議推：${noStroller.join('、')}。這些點建議改背巾、收折寄放，或當天不推長車身出門。`);
      if(cautionStroller.length)strollerTips.push(`尚可但要注意：${cautionStroller.join('、')}。請預留電梯、收折、停放或繞路時間。`);
      if(!strollerTips.length)strollerTips.push('今天各區塊大多適合推嬰兒車，仍請留意尖峰人潮與電梯位置。');
      html+=`<div class="msg ${noStroller.length?'warn':'ok'}"><h3>嬰兒車 120cm 提醒</h3>${strollerTips.map(x=>`<div>・${x}</div>`).join('')}</div>`;
      qs('#notice').innerHTML=html;
    }
    function renderCards(day,comp){
      if(!day.blocks.length){qs('#cards').innerHTML='<div class="panel empty">今天還沒有行程，請用底部「＋地點」加入。</div>';return}
      qs('#cards').innerHTML=comp.rows.map((r,idx)=>{
        const locked=!!r.b.locked;
        const dur=r.b.dur||r.p?.d||30;
        const weather=r.p?weatherScore(r.p):2;
        const stroller=strollerInfo(r.b);
        const meta=r.p?`
          <span class="badge">${AREA[r.p.a]}</span>
          <span class="badge">${r.p.i?'室內':'戶外'}</span>
          <span class="badge">孩適 ${r.p.k}</span>
          <span class="badge">${r.p.b}</span>
          <span class="badge ${weatherClass(weather)}">${modeName()} ${weatherLabel(weather)}</span>
          ${r.p.ride?'<span class="badge">乘車型</span>':''}
          ${locked?'<span class="badge lock">🔒 鎖定</span>':''}`:`<span class="badge">休息</span><span class="badge ok">不計交通</span>`;
        const note=r.b.rest?'可點名稱修改；休息區塊不計交通，區域沿用前一站。':(r.p?r.p.note:'');
        return `
          ${transportDetail(r,idx)}
          <article class="card ${locked?'locked':''}">
            <div class="cardHead">
              <div class="cardTop">
                <div>
                  <div class="pname">${blockName(r.b)}</div>
                  <div class="meta">${meta}</div>
                </div>
                <div class="time">${toHM(r.start)}–${toHM(r.end)}</div>
              </div>
              <div class="note">${note}</div>
              <div class="stroller ${strollerClass(stroller.v)}"><strong>嬰兒車：</strong>${strollerLabel(stroller.v)}｜${stroller.t}</div>
            </div>
            <div class="controls">
              <button data-act="up" data-i="${idx}" ${idx===0||locked?'disabled':''}>↑</button>
              <button data-act="down" data-i="${idx}" ${idx===day.blocks.length-1||locked?'disabled':''}>↓</button>
              <button data-act="minus" data-i="${idx}" ${dur<=15?'disabled':''}>−15</button>
              <div class="duration">${dur}分</div>
              <button data-act="plus" data-i="${idx}">＋15</button>
              <button data-act="rename" data-i="${idx}" ${!r.b.rest?'disabled':''}>改名</button>
              <button data-act="del" data-i="${idx}" class="danger" ${locked?'disabled':''}>刪除</button>
            </div>
          </article>`;
      }).join('')+(comp.home?`<div class="home"><strong>回住宿</strong>：${AREA[comp.rows.at(-1).area]} → 博多，${comp.home.m} 分，${comp.home.w}。預計到家 ${toHM(comp.end)}。<br>${GMAPS} 搜尋關鍵字：${comp.home.g}</div>`:'');
    }
    function transportDetail(r,idx){
      const lg=r.leg;
      const title=idx===0?'從今日起點前往':`從上一站前往`;
      const name=blockName(r.b);
      return `<details class="trans ${lg.via?'via':''} ${lg.m>=90?'long':''}">
        <summary>${title}「${name}」：${lg.m} 分｜${lg.w}</summary>
        <div class="transBody">
          <div>${GMAPS} 搜尋關鍵字：${lg.g||name}</div>
          <ol>${(lg.s||[]).map(x=>`<li>${x}</li>`).join('')}</ol>
        </div>
      </details>`;
    }
    function renderPlaces(){
      const areas=['all',...Object.keys(AREA).filter(a=>a!=='air')];
      qs('#areaChips').innerHTML=areas.map(a=>`<button class="chip ${a===activeArea?'active':''}" data-area="${a}">${a==='all'?'全部':AREA[a]}</button>`).join('');
      const list=P.filter(p=>!['checkin','airport_arrival'].includes(p.id)).filter(p=>activeArea==='all'||p.a===activeArea);
      qs('#placeList').innerHTML=list.map(p=>{
        const score=weatherScore(p);
        return `<div class="placeItem">
          <div>
            <strong>${p.n}</strong>
            <div class="sub">${AREA[p.a]}｜${p.i?'室內':'戶外'}｜${p.d} 分｜孩適 ${p.k}｜${p.b}｜${modeName()} ${weatherLabel(score)}</div>
          </div>
          <button data-add="${p.id}">加入</button>
        </div>`;
      }).join('');
    }
    function move(i,dir){
      const day=state.days[state.cur], j=i+dir;
      if(j<0||j>=day.blocks.length)return;
      if(day.blocks[i].locked||day.blocks[j].locked){toast('鎖定區塊不可移動，避免破壞硬限制。');return}
      [day.blocks[i],day.blocks[j]]=[day.blocks[j],day.blocks[i]];
      render();
    }
    function dayCost(blocks,day){
      const copy={...day,blocks:clone(blocks)};
      return computeDay(copy).total;
    }
    function optimize(){
      const day=state.days[state.cur], before=dayCost(day.blocks,day);
      const out=day.blocks.map(b=>isFixed(b)?clone(b):null);
      const pool=day.blocks.map((b,i)=>isFixed(b)?null:{b:clone(b),i}).filter(Boolean);
      let prev=day.origin;
      for(let i=0;i<out.length;i++){
        if(out[i]){prev=blockArea(out[i],prev);continue}
        let best=0,bestM=Infinity;
        pool.forEach((it,idx)=>{
          const ar=blockArea(it.b,prev);
          const m=(place(it.b.pid)?.ride)?0:leg(prev,ar).m;
          if(m<bestM){bestM=m;best=idx}
        });
        out[i]=pool.splice(best,1)[0].b;
        prev=blockArea(out[i],prev);
      }
      const after=dayCost(out,day);
      if(after<before){day.blocks=out;toast(`已優化順序，交通節省 ${before-after} 分。`);render()}
      else toast('目前已是較佳順序，未套用變更。');
    }
    function exportJSON(){
      const blob=new Blob([JSON.stringify(state,null,2)],{type:'application/json'});
      const a=document.createElement('a');
      a.href=URL.createObjectURL(blob);
      a.download='fukuoka-family-trip-2026.json';
      a.click();
      URL.revokeObjectURL(a.href);
      toast('已匯出 JSON 存檔。');
    }
    function importJSON(file){
      const reader=new FileReader();
      reader.onload=()=>{
        try{
          const x=JSON.parse(reader.result);
          if(!validateState(x))throw new Error('bad');
          state=x;
          if(state.cur<0||state.cur>9)state.cur=0;
          toast('已匯入行程 JSON，會在此版本上繼續修改。');
          render();
        }catch(e){toast('匯入失敗：檔案需為 v:1 且 days 必須剛好 10 天。')}
      };
      reader.readAsText(file);
    }
    function toast(msg){
      const el=qs('#toast');
      el.textContent=msg;
      el.classList.add('show');
      clearTimeout(toast.t);
      toast.t=setTimeout(()=>el.classList.remove('show'),2600);
    }
    document.addEventListener('click',e=>{
      const tab=e.target.closest('[data-tab]');
      if(tab){state.cur=Number(tab.dataset.tab);render();return}
      const mode=e.target.closest('[data-mode]');
      if(mode){state.mode=mode.dataset.mode;render();return}
      const act=e.target.closest('[data-act]');
      if(act){
        const day=state.days[state.cur], i=Number(act.dataset.i), b=day.blocks[i];
        if(act.dataset.act==='up')move(i,-1);
        if(act.dataset.act==='down')move(i,1);
        if(act.dataset.act==='minus'){b.dur=Math.max(15,(b.dur||place(b.pid)?.d||30)-15);render()}
        if(act.dataset.act==='plus'){b.dur=(b.dur||place(b.pid)?.d||30)+15;render()}
        if(act.dataset.act==='del'){
          if(b.locked)toast('鎖定區塊不可刪除。');
          else{day.blocks.splice(i,1);render()}
        }
        if(act.dataset.act==='rename'&&b.rest){
          const name=prompt('休息名稱',b.label||'休息');
          if(name&&name.trim()){b.label=name.trim();render()}
        }
        return;
      }
      const chip=e.target.closest('[data-area]');
      if(chip){activeArea=chip.dataset.area;renderPlaces();return}
      const add=e.target.closest('[data-add]');
      if(add){
        const p=place(add.dataset.add);
        state.days[state.cur].blocks.push({pid:p.id,dur:p.d,locked:LOCK_FIXED.has(p.id)?1:undefined});
        qs('#sheetBackdrop').classList.remove('show');
        toast(`已加入「${p.n}」，可用 ↑↓ 調整位置。`);
        render();
      }
    });
    qs('#startTime').addEventListener('change',e=>{state.days[state.cur].start=e.target.value||state.days[state.cur].start;render()});
    qs('#addPlaceBtn').addEventListener('click',()=>{qs('#sheetBackdrop').classList.add('show');renderPlaces()});
    qs('#closeSheetBtn').addEventListener('click',()=>qs('#sheetBackdrop').classList.remove('show'));
    qs('#sheetBackdrop').addEventListener('click',e=>{if(e.target.id==='sheetBackdrop')qs('#sheetBackdrop').classList.remove('show')});
    qs('#addRestBtn').addEventListener('click',()=>{
      state.days[state.cur].blocks.push({rest:1,label:'休息',dur:30});
      toast('已加入 30 分休息，可點「改名」。');
      render();
    });
    qs('#optBtn').addEventListener('click',optimize);
    qs('#fileBtn').addEventListener('click',()=>qs('#filePanel').classList.toggle('show'));
    qs('#closeFileBtn').addEventListener('click',()=>qs('#filePanel').classList.remove('show'));
    qs('#exportBtn').addEventListener('click',exportJSON);
    qs('#importFile').addEventListener('change',e=>{if(e.target.files[0])importJSON(e.target.files[0]);e.target.value=''});
    qs('#resetBtn').addEventListener('click',()=>{
      if(confirm('確定重置為預設 10 天行程？目前編輯會被覆蓋。')){state=defaultState();toast('已重置預設行程。');render()}
    });
    window.FKTrip={P,MAP,STROLLER,leg,computeDay,dayCost,defaultState,validateState,strollerInfo};
    render();
  </script>
</body>
</html>
