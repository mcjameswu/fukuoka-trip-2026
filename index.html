<!doctype html>
<html lang="zh-Hant-TW">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>福岡親子行程工具</title>
  <style>
    body{margin:0;min-height:100vh;display:grid;place-items:center;background:#F3F1E8;color:#20261F;font-family:system-ui,-apple-system,BlinkMacSystemFont,"Noto Sans TC",sans-serif}
    .msg{max-width:560px;padding:24px;line-height:1.6}
  </style>
</head>
<body>
  <div class="msg">正在載入福岡親子行程工具...</div>
  <script>
    (async function(){
      const version='037ae0a60d7afa1284e8cb0eae833d3b3b0f4b22';
      const base='payload-20260703-latest/';
      const parts=['part01.b64','part02.b64','part03.b64','part04.b64','part05.b64','part06.b64','part07.b64','part08.b64'];
      const texts=await Promise.all(parts.map(async name=>{
        const res=await fetch(base+name+'?v='+version,{cache:'no-store'});
        if(!res.ok) throw new Error(name+' '+res.status);
        return res.text();
      }));
      const b64=texts.join('').replace(/\s+/g,'');
      const bin=atob(b64);
      const bytes=new Uint8Array(bin.length);
      for(let i=0;i<bin.length;i++) bytes[i]=bin.charCodeAt(i);
      const html=new TextDecoder('utf-8').decode(bytes);
      document.open();
      document.write(html);
      document.close();
    })().catch(err=>{
      console.error(err);
      document.body.innerHTML='<div class="msg"><strong>載入行程工具失敗。</strong><br>請重新整理頁面；若仍失敗，請稍候 GitHub Pages 完成部署。</div>';
    });
  </script>
</body>
</html>
